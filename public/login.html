<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Elecciones Colombia 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css?v=2" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="text-center mb-3">
        <span style="font-size: 3rem;">🗳️</span>
      </div>
      <h1 class="auth-title">Iniciar Sesión</h1>
      <p class="auth-subtitle">Accede a la plataforma electoral Colombia 2026</p>

      <div id="loginAlert" class="alert alert-danger-custom d-none mb-3" role="alert"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label-custom" for="loginEmail">Correo electrónico</label>
          <input type="email" class="form-control form-control-custom" id="loginEmail" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label-custom" for="loginPassword">Contraseña</label>
          <div class="position-relative">
            <input type="password" class="form-control form-control-custom" id="loginPassword" placeholder="••••••••" required minlength="6">
            <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y" style="color: var(--text-muted); border: none;" onclick="togglePassword('loginPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 mb-3" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
        </button>
      </form>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1" style="border-color: var(--border-glass);">
        <span class="mx-3 text-muted" style="font-size: 0.85rem;">O</span>
        <hr class="flex-grow-1" style="border-color: var(--border-glass);">
      </div>

      <div id="googleBtnContainer" class="w-100 mb-4 d-flex justify-content-center"></div>

      <div class="text-center">
        <p class="text-muted mb-2">¿No tienes cuenta?</p>
        <a href="register.html" class="btn btn-secondary-custom w-100">
          <i class="bi bi-person-plus me-2"></i>Crear Cuenta
        </a>
      </div>

      <div class="text-center mt-3">
        <a href="index.html" class="text-muted" style="font-size: 0.85rem;">
          <i class="bi bi-arrow-left me-1"></i>Volver al Dashboard
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
