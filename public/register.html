<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Elecciones Colombia 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css?v=2" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="text-center mb-3">
        <span style="font-size: 3rem;">🇨🇴</span>
      </div>
      <h1 class="auth-title">Crear Cuenta</h1>
      <p class="auth-subtitle">Regístrate para votar en las elecciones 2026</p>

      <div id="registerAlert" class="alert alert-danger-custom d-none mb-3" role="alert"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="mb-3">
          <label class="form-label-custom" for="regNombre">Nombre completo</label>
          <input type="text" class="form-control form-control-custom" id="regNombre" placeholder="Tu nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label-custom" for="regEmail">Correo electrónico</label>
          <input type="email" class="form-control form-control-custom" id="regEmail" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label-custom" for="regCedula">Cédula de ciudadanía</label>
          <input type="text" class="form-control form-control-custom" id="regCedula" placeholder="Número de cédula" maxlength="20">
        </div>
        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label-custom" for="regDepartamento">Departamento</label>
            <select class="form-control form-control-custom form-select-custom" id="regDepartamento">
              <option value="">Seleccionar</option>
              <option>Amazonas</option><option>Antioquia</option><option>Arauca</option>
              <option>Atlántico</option><option>Bogotá D.C.</option><option>Bolívar</option>
              <option>Boyacá</option><option>Caldas</option><option>Caquetá</option>
              <option>Casanare</option><option>Cauca</option><option>Cesar</option>
              <option>Chocó</option><option>Córdoba</option><option>Cundinamarca</option>
              <option>Guainía</option><option>Guaviare</option><option>Huila</option>
              <option>La Guajira</option><option>Magdalena</option><option>Meta</option>
              <option>Nariño</option><option>Norte de Santander</option><option>Putumayo</option>
              <option>Quindío</option><option>Risaralda</option><option>San Andrés</option>
              <option>Santander</option><option>Sucre</option><option>Tolima</option>
              <option>Valle del Cauca</option><option>Vaupés</option><option>Vichada</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label-custom" for="regCiudad">Ciudad</label>
            <input type="text" class="form-control form-control-custom" id="regCiudad" placeholder="Tu ciudad">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label-custom" for="regPassword">Contraseña</label>
          <div class="position-relative">
            <input type="password" class="form-control form-control-custom" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
            <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y" style="color: var(--text-muted); border: none;" onclick="togglePassword('regPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-custom" for="regPasswordConfirm">Confirmar contraseña</label>
          <input type="password" class="form-control form-control-custom" id="regPasswordConfirm" placeholder="Repite tu contraseña" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 mb-3" id="registerBtn">
          <i class="bi bi-person-plus me-2"></i>Crear Cuenta
        </button>
      </form>

      <div class="text-center">
        <p class="text-muted mb-2">¿Ya tienes cuenta?</p>
        <a href="login.html" class="btn btn-secondary-custom w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
        </a>
      </div>

      <div class="text-center mt-3">
        <a href="index.html" class="text-muted" style="font-size: 0.85rem;">
          <i class="bi bi-arrow-left me-1"></i>Volver al Dashboard
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
